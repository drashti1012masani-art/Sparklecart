    <style>
        body { background-color: #ffe6f0; color: #3d003d; }
        a { text-decoration: none; }

        .btn-pink { background-color: #ff66b3; color: white; border: none; transition:0.3s; }

        .card { background-color: #ffe6f0; border: 1px solid #ff99cc; }
        footer { background-color: #ffb3d9; color: #3d003d; }
        footer a { color: #3d003d; }
        footer a:hover { color: #ff3399; }
