{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

<h2 class="text-center">My Cart 🛒</h2>

<div class="row">

{% for item in cart_items %}

<div class="col-md-4">

<div class="card shadow">

<img src="{{ url_for('static', filename='images/' + item.image) }}" class="card-img-top">

<div class="card-body text-center">

<h5>{{ item.name }}</h5>
<p>₹ {{ item.price }}</p>

</div>
</div>

</div>

{% endfor %}

</div>
</div>

{% endblock %}
