{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <h2>Your Cart</h2>
    <table class="table table-bordered mt-3">
        <tr>
            <th>Product</th>
            <th>Price</th>
        </tr>
        {% for item in items %}
        <tr>
            <td>{{ item[1] }}</td>
            <td>₹{{ item[2] }}</td>
        </tr>
        {% endfor %}
    </table>

    <h4>Total: ₹{{ total }}</h4>
</div>

{% endblock %}
